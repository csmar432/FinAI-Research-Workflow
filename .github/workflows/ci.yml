name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff mypy && pip install -e ".[dev]" --quiet

      - name: Ruff lint
        run: ruff check scripts/ --ignore E501 --max-line-length 100

      - name: MCP schema check
        run: python scripts/mcp_schema_check.py

      - name: Docker-compose validation
        run: python scripts/ci_verify.py --docker-check

  test-batch-1:
    name: Tests batch 1/3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: pip install pytest-cov -e ".[dev]" --quiet
      - name: Run core tests
        run: |
          pytest tests/test_llm_reviewer.py tests/test_modern_did.py \
            tests/test_checkpoint.py tests/test_ai_parliament.py \
            tests/test_event_monitor.py tests/test_health_check.py \
            --cov=scripts --cov-append -x -q --tb=short
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key

  test-batch-2:
    name: Tests batch 2/3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: pip install pytest-cov -e ".[dev]" --quiet
      - name: Run orchestrator tests
        run: |
          pytest tests/test_hitl_gate.py tests/test_autonomy_loop.py \
            tests/test_orchestrator.py tests/test_analyst_agents.py \
            tests/test_llm_gateway.py tests/test_ai_router.py \
            --cov=scripts --cov-append -x -q --tb=short
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key

  test-batch-3:
    name: Tests batch 3/3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: pip install pytest-cov -e ".[dev]" --quiet
      - name: Run econometrics tests
        run: |
          pytest tests/test_econometrics_DEPRECATED.py tests/test_econometrics_rules.py \
            tests/test_interactive_fixed_effects.py tests/test_panel_quantile_regression.py \
            tests/test_local_projections_did.py tests/test_journal_template.py \
            tests/test_data_cache.py tests/test_memory.py \
            tests/test_mcp_tool_market.py tests/test_journal_templates_multilang.py \
            --cov=scripts --cov-append -x -q --tb=short
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-batch-1, test-batch-2, test-batch-3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install pytest-cov -e ".[dev]" --quiet
      - name: Generate coverage report
        run: pytest tests/ --cov=scripts --cov-report=xml --cov-report=term --cov-fail-under=60 -q
      - name: Upload coverage to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build user_financial
        run: docker build --progress=plain -t finresearch/mcp-financial:test -f mcp_servers/user_financial/Dockerfile mcp_servers/user_financial/ || echo "Docker not available"
      - name: Build user_yfinance
        run: docker build --progress=plain -t finresearch/mcp-yfinance:test -f mcp_servers/user_yfinance/Dockerfile mcp_servers/user_yfinance/ || echo "Docker not available"
      - name: Container health
        run: docker run --rm finresearch/mcp-financial:test python -c "print('Container OK')" || echo "Docker test skipped"
