# .github/labeler.yml
# Schema: actions/labeler v5 (each label value MUST be an array of config objects)
# Docs: https://github.com/actions/labeler
#
# v4 → v5 breaking change: the simple `label: [glob, glob]` form is no longer
# accepted. Each entry must be an object with at least one of:
#   - changed-files    (glob list)
#   - base-branches    (branch list)
#   - headings         (PR title regex)
#   - title-glob       (PR title glob)
#   - description-glob (PR body glob)
# Glob behaviour is the same (default = match changed-files).

# ── 代码 ──────────────────────────────────────────────────────────
code:
  - changed-files:
      - scripts/**
      - mcp_servers/**/server.py

tests:
  - changed-files:
      - tests/**

ci:
  - changed-files:
      - .github/workflows/**
      - .github/labeler.yml

# ── 文档 ──────────────────────────────────────────────────────────
docs:
  - changed-files:
      - docs/**
      - "**/*.md"
      - "**/*.rst"

# ── 论文/研报 ─────────────────────────────────────────────────────
paper:
  - changed-files:
      - "**/*.tex"
      - "**/*.bib"

output:
  - changed-files:
      - output/**

# ── 配置 ──────────────────────────────────────────────────────────
config:
  - changed-files:
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.toml"
      - "**/*.ini"
      - ".env.example"
      - "pyproject.toml"

# ── 依赖 ──────────────────────────────────────────────────────────
dependencies:
  - changed-files:
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/uv.lock"
      - "**/poetry.lock"

# ── 数据 (一般不进 git, 但偶尔有 schema/seed) ─────────────────────
data:
  - changed-files:
      - data/**
      - "**/*.csv"
      - "**/*.parquet"
      - "**/*.xlsx"

# ── Skills / Knowledge ───────────────────────────────────────────
skills:
  - changed-files:
      - knowledge/skills/**
      - .claude/commands/**
      - .claude/skills/**

# ── 特殊分类 ──────────────────────────────────────────────────────
mcp:
  - changed-files:
      - mcp_servers/**
