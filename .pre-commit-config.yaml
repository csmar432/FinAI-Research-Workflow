# Pre-commit hooks
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ── Essential checks ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key   # block accidental secret commits
      - id: detect-aws-credentials
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ── Code quality ─────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix', '--ignore', 'E501,B028']
      - id: ruff-format
        exclude: ^(legacy|deprecated)/

  # ── Type checking (slow — run manually) ───────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^scripts/
        additional_dependencies: [pydantic, types-requests, types-PyYAML]
        args: ['--ignore-missing-imports', '--no-strict-optional']

  # ── Spelling ────────────────────────────────────────────────────────────────
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ['--skip', '*.po,*.pot,*.lock,*.json,*.jsonl']

  # ── Commit message format ───────────────────────────────────────────────────
  # Enforces: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert
  # Example: fix(audit): resolve _t_cdf fallback returning 0.5
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # ── Audit guard: prevent LLM-generated audit hallucinations from being
  #    accepted as factual without verification (see scripts/audit_guard.py).
  #    Runs 8 deterministic checks (file existence, grep counts, test pass)
  #    on every commit to catch hallucinated audit claims early.
  - repo: local
    hooks:
      - id: audit-guard
        name: audit-guard (defense vs hallucinated audits)
        entry: python scripts/audit_guard.py --check 2,3,4,5,7
        language: system
        pass_filenames: false
        stages: [pre-commit]
